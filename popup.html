<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainGuardian AI</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-ring">
        <img src="icons/icon48.png" alt="ChainGuardian Logo" class="logo" />
      </div>
      <h1 class="title">ChainGuardian AI</h1>
      <p class="subtitle">AI Web3 Tutor & Safety Companion</p>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span class="status-text">Extension Active</span>
      </div>
      <div class="status-badge" id="web3-badge">
        <span class="status-dot" id="web3-dot"></span>
        <span class="status-text" id="web3-status">Web3 Status: Checking...</span>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
